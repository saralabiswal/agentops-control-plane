<svg width="100%" viewBox="0 0 720 860" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
<title id="title">AgentOps Control Plane - layered architecture</title>
<desc id="desc">Clean layered architecture showing React experience, FastAPI APIs, durable task queue, AgentOps governance, provider adapters, migration-gated data layer, structured SSE, protected traces, quality scoring, and LangGraph workflow execution.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.layer-title{font-family:system-ui,sans-serif;font-size:13px;font-weight:600}
.layer-copy{font-family:system-ui,sans-serif;font-size:11px;opacity:.82}
.chip-text{font-family:system-ui,sans-serif;font-size:10.5px}
.tiny{font-family:system-ui,sans-serif;font-size:10px;opacity:.75}
.arrow{stroke:#888780;stroke-width:1;fill:none;marker-end:url(#arrow)}
.soft-arrow{stroke:#888780;stroke-width:.8;fill:none;marker-end:url(#arrow)}
.event{stroke:#1D9E75;stroke-width:1;stroke-dasharray:4 3;fill:none;marker-end:url(#arrow)}
.guard{stroke:#993C1D;stroke-width:.9;stroke-dasharray:4 3;fill:none;marker-end:url(#arrow)}
</style>
</defs>

