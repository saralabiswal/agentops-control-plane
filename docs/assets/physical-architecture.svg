<svg width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">AgentOps Control Plane - physical architecture</title>
  <desc id="desc">Updated physical runtime topology showing browser, frontend, FastAPI process, task worker, database, migrations, provider clients, optional Postgres validation, and environment settings.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#161513" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f4f2; }
      .title { font: 800 44px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .subtitle { font: 500 20px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .label { font: 800 23px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .small { font: 500 17px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .mini { font: 800 14px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .box { fill: #ffffff; stroke: #ded9d2; stroke-width: 2; filter: url(#shadow); }
      .host { fill: #fbf9f7; stroke: #8a8178; stroke-width: 3; }
      .frontend { fill: #ecf6ed; stroke: #3a7d44; }
      .backend { fill: #eef5fc; stroke: #2672b9; }
      .worker { fill: #fff3df; stroke: #ac630c; }
      .control { fill: #fff8f7; stroke: #c74634; }
      .provider { fill: #f0edff; stroke: #5f4bb6; }
      .data { fill: #eef5fc; stroke: #2672b9; }
      .ops { fill: #fbf9f7; stroke: #8a8178; }
      .item { fill: #ffffff; stroke: #ded9d2; stroke-width: 1.5; }
      .arrow { stroke: #8a8178; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .greenArrow { stroke: #3a7d44; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .redArrow { stroke: #c74634; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .orangeArrow { stroke: #ac630c; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1600"/>
  <text x="80" y="82" class="title">Physical Architecture</text>
  <text x="80" y="116" class="subtitle">Runtime topology after backend hardening: migration-gated startup, durable task worker, structured SSE, and provider lifecycle.</text>

  <rect x="80" y="165" width="250" height="150" rx="8" class="box"/>
  <text x="115" y="212" class="label">Browser</text>
  <text x="115" y="248" class="small">http://localhost:5173</text>
  <text x="115" y="278" class="small">Fetch + EventSource</text>

  <rect x="410" y="140" width="760" height="540" rx="12" class="box host"/>
  <text x="450" y="192" class="label">Developer workstation or Docker Compose network</text>
  <text x="450" y="224" class="small">Frontend and backend services share HTTP/SSE traffic; backend owns workers and runtime services.</text>

  <rect x="455" y="270" width="275" height="170" rx="8" class="box frontend"/>
  <text x="490" y="314" class="label">frontend service</text>
  <text x="490" y="346" class="small">React 18, Vite</text>
  <text x="490" y="376" class="small">Port 5173</text>
  <text x="490" y="406" class="small">Browser API client</text>

  <rect x="810" y="270" width="310" height="170" rx="8" class="box backend"/>
  <text x="845" y="314" class="label">backend service</text>
  <text x="845" y="346" class="small">FastAPI + Uvicorn</text>
  <text x="845" y="376" class="small">Port 8000</text>
  <text x="845" y="406" class="small">Typed API routers</text>

  <rect x="455" y="485" width="275" height="150" rx="8" class="box worker"/>
  <text x="490" y="529" class="label">TaskWorker</text>
  <text x="490" y="561" class="small">In-process poller</text>
  <text x="490" y="591" class="small">Claims QUEUED rows</text>
  <text x="490" y="621" class="small">Bounded concurrency</text>

  <rect x="810" y="485" width="310" height="150" rx="8" class="box control"/>
  <text x="845" y="529" class="label">Runtime graph</text>
  <text x="845" y="561" class="small">Settings, LLMClient, SSE</text>
  <text x="845" y="591" class="small">AgentOpsManager, Registry</text>
  <text x="845" y="621" class="small">QualityQueue worker</text>

  <path d="M330 240 H410" class="arrow"/>
  <path d="M730 355 H810" class="arrow"/>
  <path d="M810 570 H730" class="orangeArrow"/>
  <path d="M965 440 V485" class="arrow"/>

  <rect x="80" y="750" width="450" height="295" rx="8" class="box data"/>
  <text x="120" y="798" class="label">Database</text>
  <text x="120" y="832" class="small">Default local persistence:</text>
  <text x="120" y="860" class="small">sqlite+aiosqlite:///./agentops.db</text>
  <text x="120" y="900" class="small">Tables include Task queue state,</text>
  <text x="120" y="928" class="small">AgentRun quality status, Metrics,</text>
  <text x="120" y="956" class="small">BusinessOutcome, ModelPricing.</text>
  <rect x="120" y="990" width="170" height="38" rx="7" class="item"/>
  <text x="205" y="1015" text-anchor="middle" class="mini">SQLite local</text>
  <rect x="310" y="990" width="170" height="38" rx="7" class="item"/>
  <text x="395" y="1015" text-anchor="middle" class="mini">Postgres path</text>

  <rect x="595" y="750" width="430" height="295" rx="8" class="box ops"/>
  <text x="635" y="798" class="label">Startup and operations</text>
  <text x="635" y="832" class="small">App startup validates Alembic head.</text>
  <text x="635" y="860" class="small">No runtime table creation.</text>
  <text x="635" y="900" class="small">Cached settings are shared by DB,</text>
  <text x="635" y="928" class="small">API, workers, and providers.</text>
  <text x="635" y="968" class="small">Shutdown closes provider clients</text>
  <text x="635" y="996" class="small">and disposes the SQLAlchemy engine.</text>

  <rect x="1090" y="750" width="430" height="295" rx="8" class="box provider"/>
  <text x="1130" y="798" class="label">LLM providers</text>
  <text x="1130" y="832" class="small">Reusable async HTTP clients</text>
  <text x="1130" y="860" class="small">with transient retry policy.</text>
  <rect x="1130" y="900" width="160" height="42" rx="7" class="item"/>
  <text x="1210" y="927" text-anchor="middle" class="mini">Ollama 11434</text>
  <rect x="1310" y="900" width="160" height="42" rx="7" class="item"/>
  <text x="1390" y="927" text-anchor="middle" class="mini">Groq API</text>
  <rect x="1130" y="960" width="160" height="42" rx="7" class="item"/>
  <text x="1210" y="987" text-anchor="middle" class="mini">Gemini API</text>
  <rect x="1310" y="960" width="160" height="42" rx="7" class="item"/>
  <text x="1390" y="987" text-anchor="middle" class="mini">Model aliases</text>

  <path d="M965 635 C965 710 305 700 305 750" class="arrow"/>
  <path d="M590 635 C590 700 305 700 305 750" class="orangeArrow"/>
  <path d="M965 635 V750" class="redArrow"/>
  <path d="M965 635 C965 700 1305 700 1305 750" class="arrow"/>

  <rect x="80" y="1125" width="450" height="250" rx="8" class="box control"/>
  <text x="120" y="1172" class="label">Secured trace access</text>
  <text x="120" y="1206" class="small">Run list/detail return summaries.</text>
  <text x="120" y="1234" class="small">Raw prompt and raw response are</text>
  <text x="120" y="1262" class="small">served by /runs/{id}/trace.</text>
  <text x="120" y="1302" class="small">AGENTOPS_TRACE_API_KEY enables</text>
  <text x="120" y="1330" class="small">Bearer or X-API-Key checks.</text>

  <rect x="595" y="1125" width="430" height="250" rx="8" class="box frontend"/>
  <text x="635" y="1172" class="label">Structured SSE</text>
  <text x="635" y="1206" class="small">Backend publishes structured</text>
  <text x="635" y="1234" class="small">messages, then serializes to</text>
  <text x="635" y="1262" class="small">text/event-stream at the edge.</text>
  <text x="635" y="1302" class="small">Session filtering reads payload</text>
  <text x="635" y="1330" class="small">fields, not JSON strings.</text>

  <rect x="1090" y="1125" width="430" height="250" rx="8" class="box ops"/>
  <text x="1130" y="1172" class="label">Validation commands</text>
  <text x="1130" y="1206" class="small">make migrate</text>
  <text x="1130" y="1234" class="small">make postgres-migrate-smoke</text>
  <text x="1130" y="1262" class="small">make test / lint / typecheck</text>
  <text x="1130" y="1302" class="small">Optional env:</text>
  <text x="1130" y="1330" class="small">AGENTOPS_POSTGRES_TEST_DATABASE_URL</text>

  <path d="M810 1045 V1125" class="greenArrow"/>
  <path d="M305 1045 V1125" class="redArrow"/>
  <path d="M1305 1045 V1125" class="arrow"/>
</svg>
