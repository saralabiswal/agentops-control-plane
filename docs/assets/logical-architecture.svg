<svg width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">AgentOps Control Plane - logical architecture</title>
  <desc id="desc">Logical architecture organized by ownership boundaries after backend hardening: experience, API, queue, orchestration, control plane, observability, provider, data, and operations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#161513" flood-opacity="0.11"/>
    </filter>
    <style>
      .bg { fill: #f5f4f2; }
      .title { font: 800 44px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .subtitle { font: 500 20px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .layerTitle { font: 800 23px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .small { font: 500 17px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .mini { font: 800 14px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .layer { stroke-width: 2; filter: url(#shadow); }
      .experience { fill: #ecf6ed; stroke: #3a7d44; }
      .api { fill: #eef5fc; stroke: #2672b9; }
      .queue { fill: #fff3df; stroke: #ac630c; }
      .orchestration { fill: #f0edff; stroke: #5f4bb6; }
      .control { fill: #fff8f7; stroke: #c74634; stroke-width: 3; }
      .observability { fill: #ecf6ed; stroke: #3a7d44; }
      .provider { fill: #f0edff; stroke: #5f4bb6; }
      .data { fill: #eef5fc; stroke: #2672b9; }
      .ops { fill: #fbf9f7; stroke: #8a8178; }
      .item { fill: #ffffff; stroke: #ded9d2; stroke-width: 1.5; }
      .arrow { stroke: #8a8178; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .back { stroke: #3a7d44; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1600"/>
  <text x="80" y="82" class="title">Logical Architecture</text>
  <text x="80" y="116" class="subtitle">Capabilities and ownership boundaries after backend hardening.</text>

  <rect x="80" y="155" width="1440" height="105" rx="8" class="layer experience"/>
  <text x="115" y="196" class="layerTitle">Experience layer</text>
  <text x="115" y="228" class="small">React renders governed summaries, outcomes, quality state, and live run events.</text>
  <rect x="735" y="181" width="155" height="50" rx="7" class="item"/>
  <text x="812" y="212" text-anchor="middle" class="mini">Business view</text>
  <rect x="914" y="181" width="155" height="50" rx="7" class="item"/>
  <text x="991" y="212" text-anchor="middle" class="mini">Technical view</text>
  <rect x="1093" y="181" width="155" height="50" rx="7" class="item"/>
  <text x="1170" y="212" text-anchor="middle" class="mini">Live feed</text>
  <rect x="1272" y="181" width="185" height="50" rx="7" class="item"/>
  <text x="1364" y="212" text-anchor="middle" class="mini">Outcome ledger</text>

  <path d="M800 260 V295" class="arrow"/>
  <rect x="80" y="295" width="1440" height="118" rx="8" class="layer api"/>
  <text x="115" y="338" class="layerTitle">API layer</text>
  <text x="115" y="370" class="small">Bounded typed APIs. Raw traces use a protected endpoint.</text>
  <rect x="665" y="323" width="130" height="52" rx="7" class="item"/>
  <text x="730" y="355" text-anchor="middle" class="mini">Tasks</text>
  <rect x="815" y="323" width="130" height="52" rx="7" class="item"/>
  <text x="880" y="355" text-anchor="middle" class="mini">Runs</text>
  <rect x="965" y="323" width="130" height="52" rx="7" class="item"/>
  <text x="1030" y="355" text-anchor="middle" class="mini">Metrics</text>
  <rect x="1115" y="323" width="130" height="52" rx="7" class="item"/>
  <text x="1180" y="355" text-anchor="middle" class="mini">Stream</text>
  <rect x="1265" y="323" width="150" height="52" rx="7" class="item"/>
  <text x="1340" y="355" text-anchor="middle" class="mini">Trace API</text>

  <path d="M800 413 V448" class="arrow"/>
  <rect x="80" y="448" width="1440" height="122" rx="8" class="layer queue"/>
  <text x="115" y="491" class="layerTitle">Durable queue layer</text>
  <text x="115" y="523" class="small">Task rows are the durable queue.</text>
  <rect x="670" y="476" width="180" height="52" rx="7" class="item"/>
  <text x="760" y="508" text-anchor="middle" class="mini">QUEUED rows</text>
  <rect x="872" y="476" width="180" height="52" rx="7" class="item"/>
  <text x="962" y="508" text-anchor="middle" class="mini">TaskWorker</text>
  <rect x="1074" y="476" width="180" height="52" rx="7" class="item"/>
  <text x="1164" y="508" text-anchor="middle" class="mini">Stale recovery</text>
  <rect x="1276" y="476" width="180" height="52" rx="7" class="item"/>
  <text x="1366" y="508" text-anchor="middle" class="mini">Batch claims</text>

  <path d="M800 570 V605" class="arrow"/>
  <rect x="80" y="605" width="1440" height="125" rx="8" class="layer orchestration"/>
  <text x="115" y="648" class="layerTitle">Orchestration layer</text>
  <text x="115" y="680" class="small">Registry dispatches to agents and workflows.</text>
  <rect x="660" y="633" width="190" height="54" rx="7" class="item"/>
  <text x="755" y="665" text-anchor="middle" class="mini">Single-shot agents</text>
  <rect x="875" y="633" width="210" height="54" rx="7" class="item"/>
  <text x="980" y="665" text-anchor="middle" class="mini">Project workflow</text>
  <rect x="1110" y="633" width="190" height="54" rx="7" class="item"/>
  <text x="1205" y="665" text-anchor="middle" class="mini">Retry lineage</text>

  <path d="M800 730 V765" class="arrow"/>
  <rect x="80" y="765" width="1440" height="170" rx="8" class="layer control"/>
  <text x="115" y="810" class="layerTitle">Control plane enforcement boundary</text>
  <text x="115" y="842" class="small">Agents supply prompt, token counts, raw response, and output payload. AgentOps owns everything else.</text>
  <rect x="235" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="322" y="899" text-anchor="middle" class="mini">Run lifecycle</text>
  <rect x="435" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="522" y="899" text-anchor="middle" class="mini">Cost lock</text>
  <rect x="635" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="722" y="899" text-anchor="middle" class="mini">Metrics</text>
  <rect x="835" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="922" y="899" text-anchor="middle" class="mini">Outcomes</text>
  <rect x="1035" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="1122" y="899" text-anchor="middle" class="mini">Quality queue</text>
  <rect x="1235" y="870" width="175" height="46" rx="7" class="item"/>
  <text x="1322" y="899" text-anchor="middle" class="mini">SSE emit</text>

  <path d="M800 935 V970" class="arrow"/>
  <rect x="80" y="970" width="690" height="150" rx="8" class="layer observability"/>
  <text x="115" y="1013" class="layerTitle">Observability layer</text>
  <text x="115" y="1045" class="small">Summary records, bounded metrics, quality status, protected traces.</text>
  <rect x="170" y="1072" width="170" height="46" rx="7" class="item"/>
  <text x="255" y="1101" text-anchor="middle" class="mini">Run summary</text>
  <rect x="365" y="1072" width="170" height="46" rx="7" class="item"/>
  <text x="450" y="1101" text-anchor="middle" class="mini">Trace detail</text>
  <rect x="560" y="1072" width="170" height="46" rx="7" class="item"/>
  <text x="645" y="1101" text-anchor="middle" class="mini">SSE event IDs</text>

  <rect x="830" y="970" width="690" height="150" rx="8" class="layer provider"/>
  <text x="865" y="1013" class="layerTitle">Provider layer</text>
  <text x="865" y="1045" class="small">Reusable provider clients with retry and close-on-shutdown.</text>
  <rect x="930" y="1072" width="150" height="46" rx="7" class="item"/>
  <text x="1005" y="1101" text-anchor="middle" class="mini">Ollama</text>
  <rect x="1105" y="1072" width="150" height="46" rx="7" class="item"/>
  <text x="1180" y="1101" text-anchor="middle" class="mini">Groq</text>
  <rect x="1280" y="1072" width="150" height="46" rx="7" class="item"/>
  <text x="1355" y="1101" text-anchor="middle" class="mini">Gemini</text>

  <path d="M425 1120 V1160" class="arrow"/>
  <path d="M1175 1120 V1160" class="arrow"/>
  <rect x="80" y="1160" width="690" height="185" rx="8" class="layer data"/>
  <text x="115" y="1203" class="layerTitle">Data layer</text>
  <text x="115" y="1235" class="small">SQLAlchemy models, Alembic migrations, Postgres validation.</text>
  <rect x="145" y="1262" width="140" height="46" rx="7" class="item"/>
  <text x="215" y="1291" text-anchor="middle" class="mini">Task</text>
  <rect x="305" y="1262" width="140" height="46" rx="7" class="item"/>
  <text x="375" y="1291" text-anchor="middle" class="mini">AgentRun</text>
  <rect x="465" y="1262" width="140" height="46" rx="7" class="item"/>
  <text x="535" y="1291" text-anchor="middle" class="mini">Metric</text>
  <rect x="625" y="1262" width="110" height="46" rx="7" class="item"/>
  <text x="680" y="1291" text-anchor="middle" class="mini">Pricing</text>

  <rect x="830" y="1160" width="690" height="185" rx="8" class="layer ops"/>
  <text x="865" y="1203" class="layerTitle">Operations layer</text>
  <text x="865" y="1235" class="small">Migration-gated startup. App-owned settings and clients.</text>
  <rect x="925" y="1262" width="170" height="46" rx="7" class="item"/>
  <text x="1010" y="1291" text-anchor="middle" class="mini">Alembic head</text>
  <rect x="1120" y="1262" width="170" height="46" rx="7" class="item"/>
  <text x="1205" y="1291" text-anchor="middle" class="mini">Cached settings</text>
  <rect x="1315" y="1262" width="150" height="46" rx="7" class="item"/>
  <text x="1390" y="1291" text-anchor="middle" class="mini">Shutdown</text>

  <path d="M770 1045 H830" class="back"/>
  <path d="M770 1255 H830" class="arrow"/>
</svg>
