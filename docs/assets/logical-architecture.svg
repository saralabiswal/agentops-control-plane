<svg width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">AgentOps Control Plane - logical architecture</title>
  <desc id="desc">Logical architecture organized as experience, API, orchestration, control plane, provider, data, quality, and outcome capabilities.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#161513" flood-opacity="0.11"/>
    </filter>
    <style>
      .bg { fill: #f5f4f2; }
      .title { font: 800 44px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .subtitle { font: 500 20px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .layerTitle { font: 800 23px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .small { font: 500 17px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .mini { font: 800 14px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .box { fill: #ffffff; stroke: #ded9d2; stroke-width: 2; filter: url(#shadow); }
      .layer { stroke-width: 2; filter: url(#shadow); }
      .experience { fill: #ecf6ed; stroke: #3a7d44; }
      .api { fill: #eef5fc; stroke: #2672b9; }
      .orchestration { fill: #f0edff; stroke: #5f4bb6; }
      .control { fill: #fff8f7; stroke: #c74634; stroke-width: 3; }
      .data { fill: #eef5fc; stroke: #2672b9; }
      .quality { fill: #ecf6ed; stroke: #3a7d44; }
      .provider { fill: #fff3df; stroke: #ac630c; }
      .outcome { fill: #fbf9f7; stroke: #8a8178; }
      .item { fill: #ffffff; stroke: #ded9d2; stroke-width: 1.5; }
      .arrow { stroke: #8a8178; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .back { stroke: #3a7d44; stroke-width: 3; stroke-dasharray: 9 8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1600"/>
  <text x="80" y="82" class="title">Logical Architecture</text>
  <text x="80" y="116" class="subtitle">Capabilities and ownership boundaries from UI request to auditable business outcome.</text>

  <rect x="80" y="160" width="1440" height="112" rx="8" class="layer experience"/>
  <text x="115" y="203" class="layerTitle">Experience layer</text>
  <text x="115" y="235" class="small">React UI renders governed run data.</text>
  <rect x="690" y="186" width="180" height="54" rx="7" class="item"/>
  <text x="780" y="219" text-anchor="middle" class="mini">Business view</text>
  <rect x="892" y="186" width="180" height="54" rx="7" class="item"/>
  <text x="982" y="219" text-anchor="middle" class="mini">Technical view</text>
  <rect x="1094" y="186" width="180" height="54" rx="7" class="item"/>
  <text x="1184" y="219" text-anchor="middle" class="mini">SSE live feed</text>
  <rect x="1296" y="186" width="180" height="54" rx="7" class="item"/>
  <text x="1386" y="219" text-anchor="middle" class="mini">Guided demo</text>

  <path d="M800 272 V317" class="arrow"/>
  <rect x="80" y="317" width="1440" height="112" rx="8" class="layer api"/>
  <text x="115" y="360" class="layerTitle">API layer</text>
  <text x="115" y="392" class="small">FastAPI routers expose platform resources.</text>
  <rect x="740" y="343" width="140" height="54" rx="7" class="item"/>
  <text x="810" y="376" text-anchor="middle" class="mini">Tasks</text>
  <rect x="902" y="343" width="140" height="54" rx="7" class="item"/>
  <text x="972" y="376" text-anchor="middle" class="mini">Runs</text>
  <rect x="1064" y="343" width="140" height="54" rx="7" class="item"/>
  <text x="1134" y="376" text-anchor="middle" class="mini">Metrics</text>
  <rect x="1226" y="343" width="140" height="54" rx="7" class="item"/>
  <text x="1296" y="376" text-anchor="middle" class="mini">Stream</text>

  <path d="M800 429 V474" class="arrow"/>
  <rect x="80" y="474" width="1440" height="145" rx="8" class="layer orchestration"/>
  <text x="115" y="517" class="layerTitle">Orchestration layer</text>
  <text x="115" y="549" class="small">AgentRegistry dispatches every task through one path.</text>
  <rect x="595" y="522" width="170" height="60" rx="7" class="item"/>
  <text x="680" y="548" text-anchor="middle" class="mini">Single-shot</text>
  <text x="680" y="570" text-anchor="middle" class="small">7 business agents</text>
  <rect x="795" y="522" width="220" height="60" rx="7" class="item"/>
  <text x="905" y="548" text-anchor="middle" class="mini">ProjectPlanningAgent</text>
  <text x="905" y="570" text-anchor="middle" class="small">LangGraph 5 nodes</text>
  <rect x="1045" y="522" width="180" height="60" rx="7" class="item"/>
  <text x="1135" y="548" text-anchor="middle" class="mini">Retry lineage</text>
  <text x="1135" y="570" text-anchor="middle" class="small">retry_of link</text>

  <path d="M800 619 V664" class="arrow"/>
  <rect x="80" y="664" width="1440" height="180" rx="8" class="layer control"/>
  <text x="115" y="709" class="layerTitle">Control plane enforcement boundary</text>
  <text x="115" y="741" class="small">Agents supply five fields. AgentOps owns lifecycle, metrics, SSE, cost, quality enqueue, and outcome attachment.</text>
  <rect x="115" y="774" width="270" height="48" rx="7" class="item"/>
  <text x="250" y="804" text-anchor="middle" class="mini">AgentOpsManager</text>
  <rect x="415" y="774" width="210" height="48" rx="7" class="item"/>
  <text x="520" y="804" text-anchor="middle" class="mini">RunContext</text>
  <rect x="655" y="774" width="230" height="48" rx="7" class="item"/>
  <text x="770" y="804" text-anchor="middle" class="mini">CostCalculator</text>
  <rect x="915" y="774" width="220" height="48" rx="7" class="item"/>
  <text x="1025" y="804" text-anchor="middle" class="mini">QualityQueue</text>
  <rect x="1165" y="774" width="210" height="48" rx="7" class="item"/>
  <text x="1270" y="804" text-anchor="middle" class="mini">SSEEmitter</text>

  <path d="M432 844 L268 930" class="arrow"/>
  <path d="M800 844 V930" class="arrow"/>
  <path d="M1030 844 L1260 930" class="arrow"/>

  <rect x="80" y="930" width="390" height="220" rx="8" class="layer provider"/>
  <text x="115" y="973" class="layerTitle">Provider layer</text>
  <text x="115" y="1005" class="small">LLMClient normalizes model calls.</text>
  <rect x="115" y="1040" width="100" height="48" rx="7" class="item"/>
  <text x="165" y="1070" text-anchor="middle" class="mini">Ollama</text>
  <rect x="240" y="1040" width="100" height="48" rx="7" class="item"/>
  <text x="290" y="1070" text-anchor="middle" class="mini">Groq</text>
  <rect x="365" y="1040" width="100" height="48" rx="7" class="item"/>
  <text x="415" y="1070" text-anchor="middle" class="mini">Gemini</text>
  <text x="115" y="1121" class="small">Provider errors become AgentRun failures.</text>

  <rect x="520" y="930" width="560" height="220" rx="8" class="layer data"/>
  <text x="555" y="973" class="layerTitle">Data layer</text>
  <text x="555" y="1005" class="small">Seven tables support audit, metrics, and outcomes.</text>
  <rect x="555" y="1035" width="150" height="40" rx="7" class="item"/>
  <text x="630" y="1061" text-anchor="middle" class="mini">Session</text>
  <rect x="725" y="1035" width="150" height="40" rx="7" class="item"/>
  <text x="800" y="1061" text-anchor="middle" class="mini">Task</text>
  <rect x="895" y="1035" width="150" height="40" rx="7" class="item"/>
  <text x="970" y="1061" text-anchor="middle" class="mini">AgentRun</text>
  <rect x="555" y="1092" width="150" height="40" rx="7" class="item"/>
  <text x="630" y="1118" text-anchor="middle" class="mini">Metric</text>
  <rect x="725" y="1092" width="150" height="40" rx="7" class="item"/>
  <text x="800" y="1118" text-anchor="middle" class="mini">Pricing</text>
  <rect x="895" y="1092" width="150" height="40" rx="7" class="item"/>
  <text x="970" y="1118" text-anchor="middle" class="mini">Outcome</text>

  <rect x="1130" y="930" width="390" height="220" rx="8" class="layer quality"/>
  <text x="1165" y="973" class="layerTitle">Quality and outcomes</text>
  <text x="1165" y="1005" class="small">Async judge scores completed runs.</text>
  <rect x="1165" y="1040" width="145" height="48" rx="7" class="item"/>
  <text x="1237" y="1070" text-anchor="middle" class="mini">Relevance</text>
  <rect x="1335" y="1040" width="145" height="48" rx="7" class="item"/>
  <text x="1407" y="1070" text-anchor="middle" class="mini">Faithfulness</text>
  <rect x="1165" y="1102" width="145" height="48" rx="7" class="item"/>
  <text x="1237" y="1132" text-anchor="middle" class="mini">Completeness</text>
  <rect x="1335" y="1102" width="145" height="48" rx="7" class="item"/>
  <text x="1407" y="1132" text-anchor="middle" class="mini">Actionability</text>

  <rect x="520" y="1190" width="560" height="84" rx="8" class="layer outcome"/>
  <text x="800" y="1218" text-anchor="middle" class="mini">Business outcome ledger</text>
  <text x="800" y="1243" text-anchor="middle" class="small">delivery risk mitigated | ARR protected</text>
  <text x="800" y="1268" text-anchor="middle" class="small">quota gap recovered | ROI multiple</text>
  <path d="M1325 1150 C1325 1210 1080 1220 1080 1220" class="arrow"/>
  <path d="M800 1150 V1190" class="arrow"/>
  <path d="M1450 930 C1515 830 1515 245 1275 245" class="back"/>
  <text x="1425" y="698" class="mini" fill="#3a7d44" text-anchor="end">quality_scored SSE</text>
</svg>
