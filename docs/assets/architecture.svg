<svg width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">AgentOps Control Plane - system architecture</title>
  <desc id="desc">Updated system architecture showing React, FastAPI, durable task worker, AgentOps governance, structured SSE, protected trace access, migration validation, quality status, provider clients, and database validation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#161513" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f4f2; }
      .title { font: 800 44px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .subtitle { font: 500 20px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .label { font: 800 23px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .small { font: 500 17px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; }
      .tiny { font: 800 13px Inter, "Segoe UI", system-ui, sans-serif; fill: #665f56; text-transform: uppercase; }
      .box { fill: #ffffff; stroke: #ded9d2; stroke-width: 2; filter: url(#shadow); }
      .dark { fill: #161513; stroke: #161513; }
      .green { fill: #ecf6ed; stroke: #3a7d44; }
      .blue { fill: #eef5fc; stroke: #2672b9; }
      .red { fill: #fff8f7; stroke: #c74634; }
      .orange { fill: #fff3df; stroke: #ac630c; }
      .purple { fill: #f0edff; stroke: #5f4bb6; }
      .neutral { fill: #fbf9f7; stroke: #8a8178; }
      .chip { fill: #ffffff; stroke: #ded9d2; stroke-width: 1.4; }
      .chipText { font: 800 14px Inter, "Segoe UI", system-ui, sans-serif; fill: #161513; }
      .arrow { stroke: #8a8178; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .event { stroke: #3a7d44; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
      .secure { stroke: #c74634; stroke-width: 3; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1600"/>
  <text x="80" y="82" class="title">AgentOps Control Plane</text>
  <text x="80" y="116" class="subtitle">Updated backend architecture after queue, migration, trace, streaming, provider, and pricing hardening.</text>

  <rect x="80" y="165" width="250" height="150" rx="8" class="box dark"/>
  <text x="115" y="212" class="label" style="fill:#ffffff">Users</text>
  <text x="115" y="248" class="small" style="fill:#d8d2cb">Business operators</text>
  <text x="115" y="278" class="small" style="fill:#d8d2cb">Technical reviewers</text>

  <rect x="420" y="145" width="320" height="190" rx="8" class="box green"/>
  <text x="455" y="191" class="label">React + Vite UI</text>
  <text x="455" y="226" class="small">Run scopes, dashboards,</text>
  <text x="455" y="254" class="small">evidence, live feed</text>
  <rect x="455" y="284" width="100" height="34" rx="6" class="chip"/>
  <text x="505" y="306" text-anchor="middle" class="chipText">HTTP</text>
  <rect x="575" y="284" width="100" height="34" rx="6" class="chip"/>
  <text x="625" y="306" text-anchor="middle" class="chipText">SSE</text>

  <rect x="835" y="145" width="355" height="190" rx="8" class="box blue"/>
  <text x="870" y="191" class="label">FastAPI API surface</text>
  <text x="870" y="226" class="small">/api/v1 tasks, runs,</text>
  <text x="870" y="254" class="small">sessions, metrics, stream</text>
  <rect x="870" y="284" width="135" height="34" rx="6" class="chip"/>
  <text x="938" y="306" text-anchor="middle" class="chipText">Summary APIs</text>
  <rect x="1024" y="284" width="130" height="34" rx="6" class="chip"/>
  <text x="1089" y="306" text-anchor="middle" class="chipText">Trace auth</text>

  <rect x="1270" y="145" width="250" height="190" rx="8" class="box purple"/>
  <text x="1305" y="191" class="label">Runtime guard</text>
  <text x="1305" y="226" class="small">Alembic head check</text>
  <text x="1305" y="254" class="small">Cached settings</text>
  <text x="1305" y="282" class="small">Graceful shutdown</text>

  <path d="M330 240 H420" class="arrow"/>
  <path d="M740 240 H835" class="arrow"/>
  <path d="M1190 240 H1270" class="arrow"/>

  <rect x="80" y="405" width="1440" height="250" rx="8" class="box orange"/>
  <text x="120" y="450" class="label">Durable task execution</text>
  <text x="120" y="484" class="small">Task rows are the queue. API submission persists QUEUED work with locked pricing and retry lineage.</text>

  <rect x="125" y="520" width="255" height="105" rx="8" class="chip"/>
  <text x="150" y="552" class="tiny">Task metadata</text>
  <text x="150" y="581" class="small">model_pricing_id</text>
  <text x="150" y="606" class="small">retry_of_run_id</text>

  <rect x="430" y="520" width="255" height="105" rx="8" class="chip"/>
  <text x="455" y="552" class="tiny">TaskWorker</text>
  <text x="455" y="581" class="small">Claims QUEUED tasks</text>
  <text x="455" y="606" class="small">Runs bounded batches</text>

  <rect x="735" y="520" width="255" height="105" rx="8" class="chip"/>
  <text x="760" y="552" class="tiny">Recovery</text>
  <text x="760" y="581" class="small">Requeues interrupted</text>
  <text x="760" y="606" class="small">claims on startup</text>

  <rect x="1040" y="520" width="255" height="105" rx="8" class="chip"/>
  <text x="1065" y="552" class="tiny">Agent dispatch</text>
  <text x="1065" y="581" class="small">Registry resolves agent</text>
  <text x="1065" y="606" class="small">Existing run guard</text>

  <rect x="80" y="735" width="1440" height="265" rx="8" class="box red"/>
  <text x="120" y="780" class="label">AgentOps governance boundary</text>
  <text x="120" y="814" class="small">Every agent execution enters run_context(); AgentOps owns persisted lifecycle, metrics, cost, outcomes, SSE, and quality enqueue.</text>

  <rect x="125" y="850" width="245" height="98" rx="8" class="chip"/>
  <text x="150" y="883" class="tiny">Lifecycle</text>
  <text x="150" y="913" class="small">RUNNING before work</text>
  <text x="150" y="939" class="small">COMPLETE / FAILED</text>

  <rect x="410" y="850" width="245" height="98" rx="8" class="chip"/>
  <text x="435" y="883" class="tiny">Cost</text>
  <text x="435" y="913" class="small">Provider + model price</text>
  <text x="435" y="939" class="small">Historical row locked</text>

  <rect x="695" y="850" width="245" height="98" rx="8" class="chip"/>
  <text x="720" y="883" class="tiny">Trace</text>
  <text x="720" y="913" class="small">Stored internally</text>
  <text x="720" y="939" class="small">Protected trace API</text>

  <rect x="980" y="850" width="245" height="98" rx="8" class="chip"/>
  <text x="1005" y="883" class="tiny">Quality</text>
  <text x="1005" y="913" class="small">PENDING / SCORED</text>
  <text x="1005" y="939" class="small">FAILED with error</text>

  <rect x="1265" y="850" width="210" height="98" rx="8" class="chip"/>
  <text x="1290" y="883" class="tiny">SSE</text>
  <text x="1290" y="913" class="small">Structured events</text>
  <text x="1290" y="939" class="small">Event IDs</text>

  <rect x="80" y="1080" width="420" height="260" rx="8" class="box blue"/>
  <text x="120" y="1126" class="label">Data layer</text>
  <text x="120" y="1160" class="small">SQLite local, Postgres-ready</text>
  <text x="120" y="1188" class="small">Alembic migrations only</text>
  <text x="120" y="1216" class="small">Task, AgentRun, Metric,</text>
  <text x="120" y="1244" class="small">BusinessOutcome, Pricing</text>
  <text x="120" y="1290" class="tiny">Validation</text>
  <text x="120" y="1320" class="small">Optional Postgres smoke path</text>

  <rect x="590" y="1080" width="420" height="260" rx="8" class="box green"/>
  <text x="630" y="1126" class="label">Streaming + observability</text>
  <text x="630" y="1160" class="small">Summary runs omit raw traces</text>
  <text x="630" y="1188" class="small">Session stream filters payload</text>
  <text x="630" y="1216" class="small">Metrics default to bounded</text>
  <text x="630" y="1244" class="small">time windows</text>
  <text x="630" y="1290" class="tiny">Backpressure</text>
  <text x="630" y="1320" class="small">Full subscriber queues removed</text>

  <rect x="1100" y="1080" width="420" height="260" rx="8" class="box purple"/>
  <text x="1140" y="1126" class="label">Provider layer</text>
  <text x="1140" y="1160" class="small">Ollama, Groq, Gemini</text>
  <text x="1140" y="1188" class="small">Reusable async clients</text>
  <text x="1140" y="1216" class="small">Transient retry policy</text>
  <text x="1140" y="1244" class="small">Closed on app shutdown</text>
  <text x="1140" y="1290" class="tiny">Config</text>
  <text x="1140" y="1320" class="small">One cached settings source</text>

  <path d="M1012 335 V405" class="arrow"/>
  <path d="M800 655 V735" class="arrow"/>
  <path d="M800 1000 V1050 H290 V1080" class="arrow"/>
  <path d="M800 1000 V1080" class="event"/>
  <path d="M800 1000 V1050 H1310 V1080" class="arrow"/>
  <path d="M1000 335 C1030 375 1050 375 1090 335" class="secure"/>
</svg>
